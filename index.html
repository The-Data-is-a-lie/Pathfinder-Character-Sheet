<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder NPC Sheet</title>
    <link rel="stylesheet" href="styles/sheet.css">
    <script src="scripts/details.js" defer></script>
    <script src="scripts/sheet.js" defer></script>
</head>
<body>

<header class="topbar no-print">
    <h1>Pathfinder NPC Sheet</h1>
    <div class="topbar-buttons">
        <button id="toggle-gen" type="button">Generate</button>
        <button id="toggle-load" type="button">Load JSON</button>
        <button id="print-btn" type="button">Print</button>
    </div>
</header>

<section id="gen-panel" class="panel no-print hidden">
    <form id="gen-form">
        <div class="form-grid">
            <label>Region
                <select name="region"></select>
            </label>
            <label>Race
                <select name="race"></select>
            </label>
            <label>Class
                <select name="class"></select>
            </label>
            <label>BAB
                <select name="bab">
                    <option value="random">Random</option>
                    <option value="h">High</option>
                    <option value="m">Medium</option>
                    <option value="l">Low</option>
                </select>
            </label>
            <label>Caster Level
                <select name="caster_level">
                    <option value="random">Random</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="none">None</option>
                </select>
            </label>
            <label>Multiclass
                <select name="multiclass">
                    <option value="n">No</option>
                    <option value="y">Yes</option>
                </select>
            </label>
            <label>Alignment
                <select name="alignment">
                    <option value="random">Random</option>
                    <option value="cg">Chaotic Good</option>
                    <option value="cn">Chaotic Neutral</option>
                    <option value="ce">Chaotic Evil</option>
                    <option value="ng">Neutral Good</option>
                    <option value="n">Neutral</option>
                    <option value="ne">Neutral Evil</option>
                    <option value="lg">Lawful Good</option>
                    <option value="ln">Lawful Neutral</option>
                    <option value="le">Lawful Evil</option>
                </select>
            </label>
            <label>Deity
                <select name="deity"></select>
            </label>
            <label>Gender
                <select name="gender">
                    <option value="random">Random</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </label>
            <label>Truly Random Feats
                <select name="randomFeats">
                    <option value="y">Yes</option>
                    <option value="n">No</option>
                </select>
            </label>
            <label>Inherent Stats
                <select name="inherents">
                    <option value="y">Yes</option>
                    <option value="n">No</option>
                </select>
            </label>
            <label>Modded Char Sheet
                <select name="modded_char_sheet">
                    <option value="n">No</option>
                    <option value="y">Yes</option>
                </select>
            </label>
            <label>Homebrew Feat Amount
                <select name="homebrew_feat_amount">
                    <option value="y">Yes</option>
                    <option value="n">No</option>
                </select>
            </label>
            <label>Spheres of Power/Might
                <select name="spheres_of_power">
                    <option value="n">No</option>
                    <option value="y">Yes</option>
                </select>
            </label>
            <label>Backstory API
                <select name="use_backstory_api">
                    <option value="Y">Yes</option>
                    <option value="N">No</option>
                </select>
            </label>
            <label>Backstory Focus
                <input type="text" name="backstory_focus" placeholder="e.g. combat, faith (optional)">
            </label>
            <label>Number of Dice
                <input type="number" name="diceRolls" min="1" value="4">
            </label>
            <label>Sides per Die
                <input type="number" name="diceSides" min="1" value="6">
            </label>
            <label>Highest Level
                <input type="number" name="highestLevel" min="1" max="20" value="7">
            </label>
            <label>Lowest Level
                <input type="number" name="lowestLevel" min="1" max="20" value="7">
            </label>
            <label>Gold (blank = Paizo default)
                <input type="number" name="goldAmount" min="0" placeholder="Optional">
            </label>
        </div>
        <div class="form-actions">
            <button type="submit" id="gen-submit">Generate Character</button>
            <span id="gen-status" role="status"></span>
        </div>
        <p class="dim" id="backend-hint"></p>
    </form>
</section>

<section id="load-panel" class="panel no-print hidden">
    <p>Paste a character JSON (the response of <code>/update_character_data</code>) or pick a saved file.</p>
    <textarea id="json-paste" rows="6" placeholder='{"character_full_name": ...}'></textarea>
    <div class="form-actions">
        <button id="render-paste" type="button">Render Pasted JSON</button>
        <input type="file" id="json-file" accept=".json,application/json">
    </div>
</section>

<main id="sheet">
    <p class="placeholder">No character yet &mdash; hit <strong>Generate</strong> or <strong>Load JSON</strong> above.</p>
</main>

</body>
</html>
